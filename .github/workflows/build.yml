name: Build Firmware
on: workflow_ dispatch
jobs:  build:    runs- on: ubuntu-22.04
    steps:    - uses: actions/checkout@v4    - uses: actions/setup- python@v5      with:
        python- version: '3.10'    - name: Install PlatformIO
      run: pip install --upgrade pip platformio    - name: Build
      run: pio run -e esp32dev
    - name: Upload firmware
      uses: actions/upload- artifact@v4      with:
        name: firmware        path: .pio/build/esp32dev/